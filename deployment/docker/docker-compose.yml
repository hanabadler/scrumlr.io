version: "3.9"
services:
  scrumlr-backend:
    restart: always
    image: "ghcr.io/inovex/scrumlr.io/scrumlr-server:${SCRUMLR_BACKEND_VERSION}"
    command:
      - "-disable-check-origin"
    environment:
      SCRUMLR_LOG_LEVEL: "${SCRUMLR_LOG_LEVEL}"
      SCRUMLR_SERVER_PORT: "${SCRUMLR_SERVER_PORT}"
      SCRUMLR_SERVER_HOST: "${SCRUMLR_SERVER_HOST}"
      SCRUMLR_BASE_PATH: "${SCRUMLR_BASE_PATH}"
      SCRUMLR_INSECURE: "${SCRUMLR_INSECURE}"
      SCRUMLR_PRIVATE_KEY: "${SCRUMLR_PRIVATE_KEY}"
      SCRUMLR_SERVER_DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      SCRUMLR_SERVER_NATS_URL: "${SCRUMLR_SERVER_NATS_URL}"
      SESSION_SECRET: "${SESSION_SECRET}"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "/healthcheck"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  scrumlr-frontend:
    restart: always
    image: "ghcr.io/inovex/scrumlr.io/scrumlr-frontend:${SCRUMLR_FRONTEND_VERSION}"
    environment:
      SCRUMLR_LISTEN_PORT: "${SCRUMLR_LISTEN_PORT}"
      SCRUMLR_SERVER_URL: "${SCRUMLR_SERVER_URL}"
      SCRUMLR_WEBSOCKET_URL: "${SCRUMLR_WEBSOCKET_URL}"
      SCRUMLR_SHOW_LEGAL_DOCUMENTS: "${SCRUMLR_SHOW_LEGAL_DOCUMENTS}"
    depends_on:
      scrumlr-backend:
        condition: service_healthy
    ports:
      - "8081:8080"   # frontend exposed for EasyPanel routing

  postgres:
    restart: always
    image: "postgres:${POSTGRES_VERSION}"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    restart: always
    image: "nats:${NATS_VERSION}"

volumes:
  postgres_data:

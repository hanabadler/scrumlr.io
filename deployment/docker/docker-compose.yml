services:
  scrumlr-backend:
    restart: always
    image: ghcr.io/inovex/scrumlr.io/scrumlr-server:5.0.0
    command:
      - "-disable-check-origin"
    environment:
      SCRUMLR_LOG_LEVEL: INFO
      SCRUMLR_SERVER_PORT: 8080
      SCRUMLR_INSECURE: "false"
      SCRUMLR_BASE_PATH: ""

      SCRUMLR_PRIVATE_KEY: "change_me"

      SCRUMLR_SERVER_DATABASE_URL: postgres://scrumlr:scrumlr123@postgres:5432/scrumlr?sslmode=disable
      SCRUMLR_SERVER_NATS_URL: nats://nats:4222

      SESSION_SECRET: "supersecret"

    ports:
      - "8082:8080"   # 👈 expose backend

    depends_on:
      - postgres
      - nats

  scrumlr-frontend:
    restart: always
    image: ghcr.io/inovex/scrumlr.io/scrumlr-frontend:5.0.0
    environment:
      SCRUMLR_LISTEN_PORT: 8080
      SCRUMLR_SERVER_URL: https://api-scrumblr.knhwmj.easypanel.host
      SCRUMLR_WEBSOCKET_URL: wss://api-scrumblr.knhwmj.easypanel.host
    depends_on:
      - scrumlr-backend
    ports:
      - "8081:8080"

  postgres:
    restart: always
    image: postgres:15
    environment:
      POSTGRES_DB: scrumlr
      POSTGRES_USER: scrumlr
      POSTGRES_PASSWORD: scrumlr123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nats:
    restart: always
    image: "nats:${NATS_VERSION:-2.10}"
    command: "-js"
    volumes:
      - nats_data:/data
      
volumes:
  postgres_data:
